<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>bird overlay</title>
<style>
  :root {
    --duration: 7s;
  }
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: transparent;
    overflow: hidden;
  }
  .stage {
    position: absolute;
    inset: 0;
  }
  .bird {
    position: absolute;
    left: -120px;
    top: var(--top, 18%);
    width: 96px;
    height: 64px;
    transform-origin: center;
    animation: glide var(--duration) cubic-bezier(0.45, 0, 0.55, 1) forwards;
    will-change: transform;
  }
  .wing {
    transform-origin: 32px 32px;
    animation: flap 0.32s ease-in-out infinite;
  }
  .wing.right {
    transform-origin: 32px 32px;
    animation: flap-r 0.32s ease-in-out infinite;
  }
  @keyframes glide {
    0%   { transform: translate3d(0, 0, 0) scale(1); }
    25%  { transform: translate3d(28vw, -3vh, 0) scale(1.02); }
    55%  { transform: translate3d(58vw, 1vh, 0) scale(1); }
    80%  { transform: translate3d(85vw, -2vh, 0) scale(0.98); }
    100% { transform: translate3d(120vw, 0, 0) scale(0.95); }
  }
  @keyframes flap {
    0%, 100% { transform: rotate(-22deg); }
    50%      { transform: rotate(18deg); }
  }
  @keyframes flap-r {
    0%, 100% { transform: rotate(22deg); }
    50%      { transform: rotate(-18deg); }
  }
</style>
</head>
<body>
<div class="stage">
  <svg class="bird" viewBox="0 0 96 64" xmlns="http://www.w3.org/2000/svg">
    <ellipse cx="48" cy="36" rx="14" ry="6" fill="#3a3a3a"/>
    <circle cx="62" cy="32" r="5" fill="#3a3a3a"/>
    <polygon points="66,30 74,32 66,34" fill="#f5b400"/>
    <circle cx="63.5" cy="31" r="0.9" fill="#fff"/>
    <path class="wing" d="M44 34 Q30 16 14 22 Q26 30 36 36 Z" fill="#2b2b2b"/>
    <path class="wing right" d="M52 34 Q66 16 82 22 Q70 30 60 36 Z" fill="#2b2b2b"/>
  </svg>
</div>
<script>
  // 高度・スピードに毎回ばらつきを与えて単調さを避ける
  const bird = document.querySelector('.bird');
  const top = (8 + Math.random() * 38).toFixed(1) + '%';
  const dur = (5.5 + Math.random() * 3).toFixed(2) + 's';
  bird.style.setProperty('--top', top);
  bird.style.setProperty('--duration', dur);
</script>
</body>
</html>
